<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>EVA02 Retrieval Web (TRAKE)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      background: #f7f9fc;
      color: #222;
      font-family: system-ui, -apple-system, Roboto, "Segoe UI", Arial;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px 0;
      font-size: 24px;
      color: #2563eb;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    input,
    textarea,
    button {
      font-size: 15px;
    }

    input,
    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      color: #222;
      margin-top: 8px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      margin-top: 8px;
      font-weight: 500;
      transition: background 0.2s;
    }

    button:hover {
      background: #1e4ecf;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .col {
      flex: 1;
      min-width: 200px;
    }

    .results img {
      max-width: 240px;
      display: block;
      margin-top: 8px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .small {
      font-size: 13px;
      color: #555;
    }

    .btn-light {
      background: #e5e7eb;
      color: #111;
    }

    .btn-light:hover {
      background: #d1d5db;
    }

    .frames-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .frames-grid img {
      width: 150px;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .card h2 {
      font-size: 18px;
      margin: 0 0 12px 0;
      color: #111;
    }

    /* Hàng ảnh cuộn ngang */
    .thumb-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 12px;
      overflow-x: auto;
      padding: 6px 0;
    }

    .thumb-item {
      flex: 0 0 auto;
      /* đừng co giãn */
      width: 240px;
      /* mỗi ô ~240px */
    }

    .thumb-item img {
      width: 100%;
      height: auto;
      display: block;
    }

    pre {
      white-space: pre-wrap;
      color: #333;
      background: #f3f4f6;
      padding: 8px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>EVA02 Retrieval Web (TRAKE)</h1>

    <div class="card" id="upload-card">
      <h2 id="sessionHeader">1. Session Management</h2>
      <div id="uploadZone" onclick="document.getElementById('videoUploadInput').click()" style="border: 2px dashed #999; border-radius: 8px; padding: 40px; text-align: center; background: #fafafa; cursor: pointer; transition: background 0.3s;">
        <p style="margin: 0; color: #555; font-size: 16px;">Drag & Drop your .mp4 Video here or click to browse</p>
        <input type="file" id="videoUploadInput" accept="video/*" style="display:none;" onchange="handleVideoSelect(event)">
      </div>
      <div id="progressContainer" style="display:none; margin-top:20px;">
        <div id="statusLabel" class="small" style="font-weight: bold; margin-bottom: 8px;">Uploading...</div>
        <div style="width: 100%; background: #e5e7eb; border-radius: 8px; overflow: hidden; height: 20px;">
          <div id="progressBar" style="width: 0%; height: 100%; background: #2563eb; transition: width 0.3s;"></div>
        </div>
      </div>
      <div id="sessionInfo" class="small" style="margin-top: 10px; color: green; display: none;"></div>
      <button class="btn-light" style="margin-top: 12px; display: none;" id="resetSessionBtn" onclick="resetSession()">Start New Session</button>
    </div>

    <div id="searchSection" style="display:none; opacity: 0; transition: opacity 0.5s;">
      <div class="card">
        <h2>Stats</h2>
        <div class="small" id="statsBox">Loading stats...</div>
      </div>

    <div class="card" id="text-search-card">
      <h2>Text Search</h2>
      <div class="row">
        <div class="col">
          <input id="queryInput" placeholder="Enter text query...">
        </div>
        <div style="width:140px">
          <input id="topkInput" placeholder="Top-K (100)">
        </div>
      </div>
      <!-- New inputs for object filter -->
      <div class="row" style="margin-top:12px">
        <div class="col">
          <input id="objectInput" placeholder="List objects (comma separated)">
        </div>
        <div style="width:140px">
          <input id="thresholdInput" placeholder="Threshold (+/- for keep/remove, default 0.5)">
        </div>
        <div style="width:140px">
          <button onclick="searchText()">Search</button>
        </div>
      </div>
      <!-- Add this inside the text-search-card div, after the first row div -->
      <div class="row" style="margin-top:12px">
        <div class="col">
          <input type="file" id="textSearchImage" accept="image/*" placeholder="Optional: Upload image to rerank">
        </div>
        <div class="small" style="margin-top:4px">Optional: Upload image to rerank results</div>
      </div>
      <div id="textResults" class="results"></div>

      <div id="textResults" class="results" style="margin-top:16px;"></div>
    </div>

    <div class="card">
      <h2>Image Search (Upload)</h2>
      <div class="row">
        <div class="col">
          <input type="file" id="uploadFile" accept="image/*">
        </div>
        <div style="width:140px">
          <input id="imgTopk" placeholder="Top-K (100)">
        </div>
        <div style="width:160px">
          <button onclick="uploadAndSearch()">Upload & Search</button>
        </div>
      </div>
      <div id="imageResults" class="results"></div>

      <div id="imageResults" class="results" style="margin-top:16px;"></div>
    </div>

    <div class="card">
    </div>
  </div>

  <script>
    window.lastResults = [];
    function imgTagForPath(path, alt = "") {
      const url = "/image?path=" + encodeURIComponent(path);
      return `<img src="${url}" alt="${alt}">`;
    }
    async function searchText() {
      const q = document.getElementById("queryInput").value.trim();
      if (!q) { alert("Please enter a query"); return; }

      const topk = document.getElementById("topkInput").value || 100;
      const obj = document.getElementById("objectInput").value.trim();
      const threshold = parseFloat(document.getElementById("thresholdInput").value) || 0.5;

      // Handle image upload if present
      const imageInput = document.getElementById("textSearchImage");
      let formData = null;

      if (imageInput.files && imageInput.files[0]) {
        formData = new FormData();
        formData.append("file", imageInput.files[0]);
        formData.append("query", q);
        formData.append("top_k", topk);
        formData.append("objects", obj);
        formData.append("threshold", threshold);
      }

      document.getElementById("textResults").innerHTML = "<div class='small'>Searching...</div>";

      let res;
      if (formData) {
        // If image is present, use multipart form data
        res = await fetch("/api/search_text_with_image", {
          method: "POST",
          body: formData
        });
      } else {
        // Original text-only search
        res = await fetch("/api/search_text", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query: q,
            top_k: parseInt(topk),
            session_id: window.currentSessionId,
            objects: obj,
            threshold: threshold
          })
        });
      }

      const data = await res.json();
      window.lastResults = data.results || [];
      let html = `<div class="small" style="margin-bottom:12px">Time: ${data.elapsed?.toFixed(2)}s | Results: ${window.lastResults.length}</div>`;
      html += `<div class="thumb-row" style="flex-wrap: wrap;">`;
      for (const r of window.lastResults) {
        html += `<div class="thumb-item" style="width: 220px; border: 1px solid #ddd; padding: 8px; border-radius: 8px; background: #fff;">
                <div class="small" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${r.video_name}"><b>${r.video_name}</b></div>
                <div class="small">Frame ${r.frame_idx} | Time ${r.time_str || "?"} | Score ${r.similarity?.toFixed(3)}</div>
                <div class="small"><a href="${r.watch_url || '#'}" target="_blank">Watch</a></div>
                ${imgTagForPath(r.image_path)}
              </div>`;
      }
      html += `</div>`;
      document.getElementById("textResults").innerHTML = html;
    }
    async function uploadAndSearch() {
      const input = document.getElementById("uploadFile");
      if (!input.files.length) { alert("Choose a file first"); return; }
      const fd = new FormData();
      fd.append("file", input.files[0]);
      fd.append("top_k", document.getElementById("imgTopk").value || 100);
      document.getElementById("imageResults").innerHTML = "<div class='small'>Uploading...</div>";
      const res = await fetch("/api/upload_image", { method: "POST", body: fd });
      const data = await res.json();
      window.lastResults = data.results || [];
      let html = `<div class="small" style="margin-bottom:12px">Time: ${data.elapsed?.toFixed(2)}s | Results: ${window.lastResults.length}</div>`;
      html += `<div class="thumb-row" style="flex-wrap: wrap;">`;
      for (const r of window.lastResults) {
        html += `<div class="thumb-item" style="width: 220px; border: 1px solid #ddd; padding: 8px; border-radius: 8px; background: #fff;">
                <div class="small" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${r.video_name}"><b>${r.video_name}</b></div>
                <div class="small">Frame ${r.frame_idx} | Score ${r.similarity?.toFixed(3)}</div>
                <div class="small"><a href="${r.watch_url || '#'}" target="_blank">Watch</a></div>
                ${imgTagForPath(r.image_path)}
              </div>`;
      }
      html += `</div>`;
      document.getElementById("imageResults").innerHTML = html;
    }


    // Removed redundant grouping, export mechanisms
    
    async function showFrames() {
      const vid = document.getElementById("videoNameInput").value.trim();
      if (!vid) { alert("Enter video"); return; }
      let url = "/api/get_frames/" + encodeURIComponent(vid);
      if (window.currentSessionId) url += "?session_id=" + window.currentSessionId;
      const res = await fetch(url);
      const data = await res.json();
      let html = "";
      for (const f of data) {
        html += imgTagForPath(f.image_path);
      }
      document.getElementById("framesView").innerHTML = html;
    }
    
    async function showFramesRange() {
      const vid = document.getElementById("videoNameRangeInput").value.trim();
      const frameId = document.getElementById("frameIdInput").value.trim();
      const range = document.getElementById("rangeInput").value.trim();
      if (!vid) { alert("Enter video"); return; }
      if (!frameId || isNaN(frameId)) { alert("Enter a valid Frame ID"); return; }
      if (!range || isNaN(range)) { alert("Enter a valid Range"); return; }
      let url = "/api/get_frames_range/" + encodeURIComponent(vid) + "/" + frameId + "/" + range;
      if (window.currentSessionId) url += "?session_id=" + window.currentSessionId;
      const res = await fetch(url);
      const data = await res.json();
      let html = "";
      for (const f of data) {
        html += imgTagForPath(f.image_path);
      }
      document.getElementById("framesRangeView").innerHTML = html;
    }

    // --- Task 3: Upload and Polling Logic ---
    window.currentSessionId = localStorage.getItem("eva02_session_id");
    let pollingInterval = null;

    window.onload = function() {
      const dropZone = document.getElementById("uploadZone");
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.background = "#eef2ff";
      });
      dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.style.background = "#fafafa";
      });
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.background = "#fafafa";
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          uploadVideo(e.dataTransfer.files[0]);
        }
      });

      if (window.currentSessionId) {
        checkStatus(window.currentSessionId, true);
      }
    };

    async function fetchStats() {
      if (!window.currentSessionId) return;
      try {
        const res = await fetch("/api/stats?session_id=" + window.currentSessionId);
        const data = await res.json();
        document.getElementById("statsBox").innerHTML = `<b>Videos:</b> ${data.total_videos} | <b>Total Extract Frames:</b> ${data.total_images}`;
      } catch (e) {
        document.getElementById("statsBox").innerText = "N/A";
      }
    }

    function handleVideoSelect(e) {
      if (e.target.files.length) {
        uploadVideo(e.target.files[0]);
      }
    }

    async function uploadVideo(file) {
      document.getElementById("uploadZone").style.display = "none";
      document.getElementById("progressContainer").style.display = "block";
      document.getElementById("statusLabel").innerText = "Uploading via HTTP...";
      document.getElementById("progressBar").style.width = "5%";

      const fd = new FormData();
      fd.append("file", file);
      if (window.currentSessionId) {
        fd.append("session_id", window.currentSessionId);
      }

      try {
        const res = await fetch("/api/upload_video", { method: "POST", body: fd });
        const data = await res.json();
        if (data.session_id) {
          window.currentSessionId = data.session_id;
          localStorage.setItem("eva02_session_id", window.currentSessionId);
          startPolling(window.currentSessionId);
        } else {
          alert("Upload failed: " + data.error);
          document.getElementById("uploadZone").style.display = "block";
        }
      } catch (e) {
        alert("Upload exception: " + e.message);
        document.getElementById("uploadZone").style.display = "block";
        document.getElementById("progressContainer").style.display = "none";
      }
    }

    function startPolling(sessionId) {
      if (pollingInterval) clearInterval(pollingInterval);
      pollingInterval = setInterval(() => checkStatus(sessionId, false), 1500);
    }

    async function checkStatus(sessionId, isInitialLoad) {
      try {
        const res = await fetch(`/api/status/${sessionId}`);
        const data = await res.json();
        
        if (data.status === "NOT_FOUND") {
          if (!isInitialLoad) alert("Session lost on server.");
          resetSession();
          return;
        }

        if (data.status === "DONE") {
          finishProcessing(sessionId);
        } else if (data.status === "FAILED") {
          if (pollingInterval) clearInterval(pollingInterval);
          document.getElementById("statusLabel").innerText = `FAILED: ${data.message}`;
          document.getElementById("progressBar").style.background = "#ef4444";
          document.getElementById("resetSessionBtn").style.display = "block";
        } else {
          // Processing
          document.getElementById("uploadZone").style.display = "none";
          document.getElementById("progressContainer").style.display = "block";
          document.getElementById("progressBar").style.width = `${data.progress || 5}%`;
          document.getElementById("statusLabel").innerText = `${data.status}: ${data.message || 'Processing...'}`;
        }
      } catch (e) {
        console.error("Polling error:", e);
      }
    }

    function finishProcessing(sessionId) {
      if (pollingInterval) clearInterval(pollingInterval);
      document.getElementById("uploadZone").style.display = "block"; // Show again for multiple uploads
      document.getElementById("progressContainer").style.display = "none";
      
      const info = document.getElementById("sessionInfo");
      info.innerText = `✅ Workspace Active: ${sessionId} (Bạn có thể kéo thả thêm video khác vào cùng session)`;
      info.style.display = "block";
      document.getElementById("resetSessionBtn").style.display = "inline-block";
      
      const searchSec = document.getElementById("searchSection");
      searchSec.style.display = "block";
      
      // Fetch latest stats dynamically
      fetchStats();

      // trigger reflow
      void searchSec.offsetWidth;
      searchSec.style.opacity = 1;
    }

    function resetSession() {
      if (pollingInterval) clearInterval(pollingInterval);
      localStorage.removeItem("eva02_session_id");
      window.currentSessionId = null;
      
      document.getElementById("uploadZone").style.display = "block";
      document.getElementById("progressContainer").style.display = "none";
      document.getElementById("sessionInfo").style.display = "none";
      document.getElementById("resetSessionBtn").style.display = "none";
      document.getElementById("progressBar").style.width = "0%";
      document.getElementById("progressBar").style.background = "#2563eb";
      document.getElementById("videoUploadInput").value = "";
      
      const searchSec = document.getElementById("searchSection");
      searchSec.style.opacity = 0;
      setTimeout(() => { searchSec.style.display = "none"; }, 500);
    }

  </script>
</body>

</html>
